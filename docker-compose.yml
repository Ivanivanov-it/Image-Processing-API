services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-image_api}
      POSTGRES_USER: ${DB_USER:-image_api}
      POSTGRES_PASSWORD: ${DB_PASS:-development-only-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin-change-me}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set none local/$${MINIO_BUCKET};"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin-change-me}
      MINIO_BUCKET: ${MINIO_BUCKET:-images}

  web:
    build: .
    command: >
      sh -c "python manage.py migrate && python manage.py collectstatic --noinput &&
      gunicorn Image_processing_API.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    env_file: .env
    environment: &django-env
      DEBUG: "false"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      USE_MINIO: "true"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin-change-me}
      MINIO_BUCKET: ${MINIO_BUCKET:-images}
      SECURE_COOKIES: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - static_data:/app/staticfiles
      - model_data:/home/django/.u2net

  worker:
    build: .
    command: celery -A Image_processing_API worker -l info --concurrency=2
    env_file: .env
    environment: *django-env
    depends_on:
      web:
        condition: service_started
    volumes:
      - model_data:/home/django/.u2net

  beat:
    build: .
    command: celery -A Image_processing_API beat -l info
    env_file: .env
    environment: *django-env
    depends_on:
      web:
        condition: service_started

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8080:80"
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_data:
  model_data:
